{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit {{ title }}
{% endblock %}

{% block body %}
    <h1>Edit {{ title }}</h1>
    <form method="post" action="{% url 'edit_entry' title %}">
        {% csrf_token %}
        {{ form }}
        <input class="btn btn-primary" type="submit" value="Edit Page">
    </form>
{% endblock %}
